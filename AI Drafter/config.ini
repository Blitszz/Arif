[scrcpy]
# Window title pattern to find the Scrcpy window
window_title = TECNO KM5n
# Monitor index (1 = primary monitor)
monitor = 1

[resolution]
# Scrcpy window resolution (adjust to your setup)
# These are the default for 1280x720 scrcpy window
width = 1280
height = 720

[scan_regions]
# Coordinates as x, y, width, height relative to scrcpy window
# Ban slots (top area) - Team (left side) and Enemy (right side)
ban_team_1 = 280, 8, 44, 44
ban_team_2 = 336, 8, 44, 44
ban_team_3 = 392, 8, 44, 44
ban_team_4 = 448, 8, 44, 44
ban_team_5 = 504, 8, 44, 44
ban_enemy_1 = 736, 8, 44, 44
ban_enemy_2 = 792, 8, 44, 44
ban_enemy_3 = 848, 8, 44, 44
ban_enemy_4 = 904, 8, 44, 44
ban_enemy_5 = 960, 8, 44, 44

# Pick slots - Team (left column)
pick_team_1 = 8, 200, 56, 56
pick_team_2 = 8, 280, 56, 56
pick_team_3 = 8, 360, 56, 56
pick_team_4 = 8, 440, 56, 56
pick_team_5 = 8, 520, 56, 56

# Pick slots - Enemy (right column)
pick_enemy_1 = 1216, 200, 56, 56
pick_enemy_2 = 1216, 280, 56, 56
pick_enemy_3 = 1216, 360, 56, 56
pick_enemy_4 = 1216, 440, 56, 56
pick_enemy_5 = 1216, 520, 56, 56

[vision]
# Template matching confidence threshold (0.0 - 1.0)
confidence = 0.75
# Scan interval in seconds (1-2 FPS for low-end CPU)
scan_interval = 1.0
# Use grayscale matching (faster)
grayscale = true

[hotkeys]
# Key to pause/resume vision scanning
toggle_scan = <alt>+s
# Key to minimize/restore overlay
toggle_minimize = <alt>+m
# Key to reset draft state
reset_draft = <f10>
# Key to quit application
quit_app = <f12>

[ui]
# Overlay opacity (0.0 - 1.0)
opacity = 0.85
# Overlay width in pixels
overlay_width = 320
# Overlay position: left or right
overlay_position = right
# Theme colors (hex)
color_primary = #00FF41
color_secondary = #008F11
color_accent = #39FF14
color_bg = #0D0D0D
color_danger = #FF0040
color_warning = #FFB800